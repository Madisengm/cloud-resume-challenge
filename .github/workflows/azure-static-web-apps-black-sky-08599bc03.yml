name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:

  # ─── Job 1: Cypress E2E tests ──────────────────────────────────────────
  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular app
        run: npx ng build --configuration production
        working-directory: frontend

      - name: Start Angular app and run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npx ng serve --configuration development
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 60
          browser: chrome
        env:
          CYPRESS_baseUrl: http://localhost:4200

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore

  # ─── Job 2: Deploy to Azure SWA ───────────────────────────────────────
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: cypress
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SKY_08599BC03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          api_location: api
          output_location: dist/frontend/browser

  # ─── Job 3: Close PR environment ──────────────────────────────────────
  close_pull_request:
    name: Close Pull Request
    runs-on: ubuntu-latest
    needs: cypress
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SKY_08599BC03 }}
          action: close
