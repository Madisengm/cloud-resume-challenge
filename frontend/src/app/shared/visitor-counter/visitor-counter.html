<div class="mt-4 flex flex-col items-center animate-fade-in">
  <div class="flex items-center space-x-3 bg-white/5 border border-white/10 px-5 py-2 rounded-full backdrop-blur-sm">
    <span class="relative flex h-3 w-3">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#FFDB58] opacity-75"></span>
      <span class="relative inline-flex rounded-full h-3 w-3 bg-[#FFDB58]"></span>
    </span>
    <p class="text-gray-300 text-sm md:text-base font-light tracking-wide">
      Live Views:
      <span class="text-[#FFDB58] font-mono font-bold ml-1">
        {{ count !== null ? (count | number) : '...' }}
      </span>
    </p>
  </div>
  <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-2">
    Powered by Azure Serverless
  </p>
</div>
